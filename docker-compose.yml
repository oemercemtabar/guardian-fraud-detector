version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: guardian-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    working_dir: /app
    environment:
      APP_NAME: Guardian Fraud Detector
      APP_VERSION: 0.1.0
      API_V1_PREFIX: /api/v1
      DEBUG: "true"
      DATABASE_URL: sqlite:///./guardian.db
    command: ["python", "-m", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build:
      context: ./frontend
    container_name: guardian-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000/api/v1